services:
  - type: web
    runtime: docker
    name: stockpilot
    repo: https://github.com/Stuaarts/Smart-Inventory-Management-System.git
    branch: main
    plan: free
    region: ohio
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: stockpilot-postgres
          property: connectionString

databases:
  - name: stockpilot-postgres
    plan: free
    region: ohio
    databaseName: stockpilot
    user: stockpilot_user
    ipAllowList: []
