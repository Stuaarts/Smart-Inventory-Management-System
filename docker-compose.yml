services:
  postgres:
    image: postgres:16
    container_name: smart-inventory-postgres
    environment:
      POSTGRES_DB: smart_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - smart_inventory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  smart_inventory_pgdata:
